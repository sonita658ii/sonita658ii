name: CI Build & Test

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '15 */3 * * *'
    - cron: '30 */6 * * *'
    - cron: '45 */12 * * *'
    - cron: '59 17 * * *'
  workflow_dispatch: # Mengizinkan eksekusi manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Cache Optimization
        run: |
          git config --local user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          
          # Probabilitas 10% untuk "Rest Day" (0 commit) agar tidak ketahuan bot
          REST_CHANCE=$(( RANDOM % 100 ))
          if [ $REST_CHANCE -lt 10 ]; then
            exit 0
          fi
          
          # Acak jumlah commit dari 1 sampai 85 (Membuat warna kotak hijau bervariasi)
          NUM_COMMITS=$(( ( RANDOM % 85 )  + 1 ))
          
          for i in $(seq 1 $NUM_COMMITS); do
            echo "Cache sync $i at $(date +'%Y-%m-%d %H:%M:%S')" >> .cache_sys_sync.log
            git add .cache_sys_sync.log
            git commit -m "chore: update build cache [skip ci]"
          done
          
          git push
